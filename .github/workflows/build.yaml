name: Build Artifacts

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Go Artifacts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: binboi-server-linux-amd64
            output_path: dist/binboi-server-linux-amd64
            package: ./cmd/binboi-server
            goos: linux
            goarch: amd64
          - artifact_name: binboi-client-darwin-arm64
            output_path: dist/binboi-client-darwin-arm64
            package: ./cmd/binboi-client
            goos: darwin
            goarch: arm64
          - artifact_name: binboi-client-linux-amd64
            output_path: dist/binboi-client-linux-amd64
            package: ./cmd/binboi-client
            goos: linux
            goarch: amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download modules
        run: go mod download

      - name: Build ${{ matrix.artifact_name }}
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -o "${{ matrix.output_path }}" "${{ matrix.package }}"

      - name: Upload ${{ matrix.artifact_name }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.output_path }}
