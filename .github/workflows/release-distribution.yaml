name: Release Distribution

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  prepare:
    name: Prepare Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync manifests
        run: make sync-manifests

      - name: Verify manifests are committed
        run: git diff --exit-code

      - name: Read version
        id: version
        run: echo "value=$(node -p 'require(\"./binboi.json\").version')" >> "$GITHUB_OUTPUT"

  release-cli:
    name: Build CLI Release Archives
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CLI archive
        run: |
          mkdir -p dist/release
          VERSION="${{ needs.prepare.outputs.version }}"
          ARTIFACT="binboi_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "dist/release/${ARTIFACT}"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -ldflags "-s -w -X github.com/miransas/binboi/internal/cli.Version=${VERSION}" -o "dist/release/${ARTIFACT}/binboi" ./cmd/binboi-client
          tar -C dist/release -czf "dist/${ARTIFACT}.tar.gz" "${ARTIFACT}"

      - name: Upload CLI archive
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  publish-npm:
    name: Publish NPM Wrapper
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ secrets.NPM_TOKEN != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Sync manifests
        run: make sync-manifests

      - name: Verify wrapper package
        run: bash ./scripts/verify-distribution-manifests.sh

      - name: Publish @miransas/binboi
        working-directory: packaging/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

  publish-cargo:
    name: Publish Cargo Wrapper
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ secrets.CRATES_IO_TOKEN != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync manifests
        run: make sync-manifests

      - name: Verify crate layout
        run: cargo package --manifest-path rust/Cargo.toml --allow-dirty --list

      - name: Publish miransas-binboi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish --manifest-path rust/Cargo.toml --allow-dirty

  publish-python:
    name: Publish Python Wrapper
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ secrets.PYPI_API_TOKEN != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync manifests
        run: make sync-manifests

      - name: Build Python distributions
        run: python -m build ./packaging/python

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: packaging/python/dist/

  build-debian:
    name: Build Debian Packages
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Debian packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Sync manifests
        run: make sync-manifests

      - name: Build Debian package
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          GOARCH: ${{ matrix.goarch }}
        run: bash ./scripts/build-debian-package.sh

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.goarch }}
          path: dist/debian/*.deb

  release-github:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs: [prepare, release-cli, build-debian]

    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: dist/releases
          merge-multiple: true

      - name: Download Debian artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: deb-*
          path: dist/debian
          merge-multiple: true

      - name: Install Debian repository tooling
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Build APT repository bundle
        run: bash ./scripts/build-apt-repo.sh

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/releases/*.tar.gz
            dist/debian/*.deb
            dist/binboi-apt-repo.tar.gz
          generate_release_notes: true
