version: "3.8"

services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: binboi-caddy
    restart: unless-stopped

    ports:
      - "80:80"    # HTTP (redirects to HTTPS)
      - "443:443"  # HTTPS
      - "443:443/udp"  # HTTP/3

    environment:
      CLOUDFLARE_API_TOKEN: "${CLOUDFLARE_API_TOKEN}"
      BINBOI_BASE_DOMAIN: "${BINBOI_BASE_DOMAIN:-binboi.com}"
      BINBOI_UPSTREAM_HOST: "core"
      ACME_EMAIL: "${ACME_EMAIL:-admin@binboi.com}"

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

    depends_on:
      core:
        condition: service_healthy

    networks:
      - binboi-net

  core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: binboi-core
    restart: unless-stopped

    # Ports 8080 and 8000 are internal — all HTTP/HTTPS traffic goes through Caddy.
    # Port 8081 (tunnel listener) is exposed directly for CLI agent connections.
    ports:
      - "8081:8081" # tunnel listener — CLI agents connect here directly

    environment:
      BINBOI_API_ADDR: ":8080"
      BINBOI_TUNNEL_ADDR: ":8081"
      BINBOI_PROXY_ADDR: ":8000"
      BINBOI_BASE_DOMAIN: "${BINBOI_BASE_DOMAIN:-binboi.localhost}"
      BINBOI_PUBLIC_SCHEME: "https"
      BINBOI_PUBLIC_PORT: "443"
      BINBOI_DATABASE_PATH: "/data/binboi.db"
      BINBOI_JWT_SECRET: "${BINBOI_JWT_SECRET}"
      BINBOI_AUTH_DATABASE_URL: "${BINBOI_AUTH_DATABASE_URL:-postgres://binboi:binboi@binboi-postgres:5432/binboi}"
      BINBOI_ALLOW_PREVIEW_MODE: "${BINBOI_ALLOW_PREVIEW_MODE:-false}"

    volumes:
      - binboi-data:/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - binboi-net

  postgres:
    image: postgres:15
    container_name: binboi-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: binboi
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-binboi}"
      POSTGRES_DB: binboi

    volumes:
      - pg-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U binboi -d binboi"]
      interval: 5s
      timeout: 3s
      retries: 10

    networks:
      - binboi-net

volumes:
  binboi-data:
  pg-data:
  caddy-data:    # persists TLS certificates across restarts
  caddy-config:  # persists Caddy internal config

networks:
  binboi-net:

