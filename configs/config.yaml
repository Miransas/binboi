server:
  # Local control plane listener used during development.
  addr: "0.0.0.0:8080"
  # Shared token for manual local testing only. Replace before sharing.
  token: "replace-with-local-dev-token"

client:
  # Point the client at the relay/control-plane address.
  remote_addr: "127.0.0.1:8080"
  local_port: 3000
  subdomain: "my-local-app"
  # Use the same shared token as the server sample above.
  token: "replace-with-local-dev-token"
